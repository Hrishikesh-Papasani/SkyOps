packages:
  # dbt-labs utilities: generate_surrogate_key, date_spine, etc.
  # generate_surrogate_key is used in fact_flights.sql for flight_id
  - package: dbt-labs/dbt_utils
    version: [">=1.1.0", "<2.0.0"]

  # Databricks-specific macros: optimize, zorder, liquid clustering
  # Required for Delta-specific performance configurations
  - package: databricks/dbt_databricks_utils
    version: [">=0.1.0", "<1.0.0"]
